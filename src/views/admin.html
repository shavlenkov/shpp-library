<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        #test {
            border: 5px solid #000;
            height: 550px;
            border-radius: 10px;
            padding: 20px;
        }

    </style>
</head>
<body>
  <div class="container-fluid">
      <h1>Библиотека++</h1>
      <div class="row">
          <div class="col-lg-6">
              <table class="table table-hover">
                  <thead>
                  <tr>
                      <th>ID</th>
                      <th>Название</th>
                      <th>Автор</th>
                      <th>Год</th>
                      <th>Страниц</th>
                      <th>Обложка</th>
                      <th>Просмотров</th>
                      <th>Кликов</th>
                  </tr>
                  </thead>
                  <tbody>
                  <tr>
                      <td>John</td>
                      <td>Doe</td>
                      <td>john@example.com</td>
                  </tr>
                  </tbody>
              </table>
          </div>
          <div class="col-lg-6">
              <div id="test" class="row">
                  <form action="" method="post" enctype="multipart/form-data" class="input-group mb-3">
                          <div class="col-lg-6">
                              <input type="text" class="form-control" placeholder="Название книги"><br>
                              <input type="number" class="form-control" placeholder="Год создания книги"><br>
                              <input type="number" class="form-control" placeholder="Количество страниц книги"><br>
                              <input id="img" type="file" multiple accept="image/*" class="form-control" id="inputGroupFile01"><br>
                              <img width="150" height="200" id="img-preview" src="/images/defaultCover.jpg" /><br/>
                              <button class="btn btn-success">Добавить</button>
                          </div>
                          <div class="col-lg-6">
                              <input type="text" class="form-control" placeholder="Автор 1"><br>
                              <input type="text" class="form-control" placeholder="Автор 2"><br>
                              <input type="text" class="form-control" placeholder="Автор 3"><br>

                          </div>
                       </form>
              </div>
          </div>
      </div>
  </div>

  <script type = "text/javascript" src = "https://ajax.googleapis.com/ajax/libs/jquery/1/jquery.min.js"></script>
  <script>
      $('#img').change(function () {
          var input = $(this)[0];
          if (input.files && input.files[0]) {
              if (input.files[0].type.match('image.*')) {
                  var reader = new FileReader();
                  reader.onload = function (e) {
                      $('#img-preview').attr('src', e.target.result);
                  }
                  reader.readAsDataURL(input.files[0]);
              } else {
                  console.log('ошибка, не изображение');
              }
          } else {
              console.log('хьюстон у нас проблема');
          }
      });


  </script>
</body>
</html>
